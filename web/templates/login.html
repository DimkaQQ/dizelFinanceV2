<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DizelFinance — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810; --bg1: #0d0d1a; --bg2: #111120;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.10);
      --text: #f0f0fa; --text2: #a0a0c0; --text3: #60607a;
      --accent: #4fffb0; --red: #ff4d6d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Фоновая сетка */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    /* Glow */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(79,255,176,0.06) 0%, transparent 70%);
      top: -100px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      padding: 0 20px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.5s ease both;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      font-size: 22px;
      margin-bottom: 14px;
      box-shadow: 0 0 40px rgba(79,255,176,0.25);
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .logo-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 4px;
    }

    .box {
      background: var(--bg1);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 28px;
    }
    .box-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .box-sub {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      transition: all 0.15s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.08);
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.15s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .error {
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.2);
      color: var(--red);
      padding: 9px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 18px;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-badge">⚡</div>
    <div class="logo-name">DizelFinance</div>
    <div class="logo-tag">Personal Finance OS</div>
  </div>

  <div class="box">
    <div class="box-title">Добро пожаловать</div>
    <div class="box-sub">Введите учётные данные для входа</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" required autofocus placeholder="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button class="btn" type="submit">Войти →</button>
    </form>
  </div>

  <div class="footer-note">finance.dtldv.ru · secured</div>
</div>
</body>
</html>
