<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Control — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Cabinet+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#07070e; --bg1:#0c0c16; --bg2:#12121f;
      --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
      --text:#eeeef8; --text2:#9999bb; --text3:#55556e;
      --accent:#5affe0; --red:#ff4f72;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body {
      background:var(--bg); color:var(--text);
      font-family:'Cabinet Grotesk',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(90,255,224,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90,255,224,0.025) 1px, transparent 1px);
      background-size:48px 48px;
      pointer-events:none;
    }
    body::after {
      content:'';
      position:fixed;
      width:600px; height:400px;
      background:radial-gradient(ellipse, rgba(90,255,224,0.05) 0%, transparent 70%);
      top:-100px; left:50%; transform:translateX(-50%);
      pointer-events:none;
    }
    .wrap {
      width:100%; max-width:380px; padding:0 20px;
      position:relative; z-index:1;
      animation:up 0.45s ease both;
    }
    @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

    .logo-area { text-align:center; margin-bottom:28px; }
    .logo-badge {
      display:inline-flex; align-items:center; justify-content:center;
      width:52px; height:52px;
      background:linear-gradient(135deg,#5affe0,#7b6fff);
      border-radius:14px; font-size:22px;
      margin-bottom:14px;
      box-shadow:0 0 40px rgba(90,255,224,0.2);
    }
    .logo-name {
      font-weight:800; font-size:20px; letter-spacing:-0.03em; color:var(--text);
    }
    .logo-tag {
      font-family:'Geist Mono',monospace;
      font-size:9px; letter-spacing:0.15em; text-transform:uppercase;
      color:var(--text3); margin-top:4px;
    }

    .box {
      background:var(--bg1); border:1px solid var(--border2);
      border-radius:14px; padding:26px;
    }
    .box-title { font-weight:700; font-size:16px; letter-spacing:-0.02em; margin-bottom:3px; }
    .box-sub   { font-size:12px; color:var(--text3); margin-bottom:22px; }

    .form-group { margin-bottom:13px; }
    label {
      display:block; font-family:'Geist Mono',monospace;
      font-size:9px; letter-spacing:0.14em; text-transform:uppercase;
      color:var(--text3); margin-bottom:5px;
    }
    input {
      width:100%; background:var(--bg2); border:1px solid var(--border2);
      border-radius:8px; padding:10px 13px; color:var(--text);
      font-family:'Cabinet Grotesk',sans-serif; font-size:13px; transition:all 0.15s;
    }
    input:focus {
      outline:none; border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(90,255,224,0.07);
    }

    .btn {
      width:100%; padding:11px; background:var(--accent); border:none;
      border-radius:8px; color:#000;
      font-family:'Cabinet Grotesk',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; margin-top:6px; transition:all 0.15s; letter-spacing:-0.01em;
    }
    .btn:hover { opacity:0.85; transform:translateY(-1px); }

    .error {
      background:rgba(255,79,114,0.08); border:1px solid rgba(255,79,114,0.2);
      color:var(--red); padding:9px 13px; border-radius:8px;
      font-size:12px; margin-bottom:16px;
    }
    .footer-note {
      text-align:center; margin-top:18px;
      font-family:'Geist Mono',monospace; font-size:9px; color:var(--text3);
      letter-spacing:0.06em;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-badge">⚡</div>
    <div class="logo-name">Wealth Control</div>
    <div class="logo-tag">Personal Finance OS</div>
  </div>
  <div class="box">
    <div class="box-title">Добро пожаловать</div>
    <div class="box-sub">Введите учётные данные</div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" required autofocus placeholder="username">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button class="btn" type="submit">Войти →</button>
    </form>
  </div>
  <div class="footer-note">wealth-control · secured · {{ now.year if now is defined else '' }}</div>
</div>
</body>
</html>
