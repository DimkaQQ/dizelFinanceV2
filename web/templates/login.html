<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DizelFinance — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
      top: -150px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .box {
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #7c6aff, #a855f7);
      border-radius: 16px;
      display: flex;
      align-items: center; justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 14px;
      box-shadow: 0 0 32px rgba(124,106,255,0.3);
    }
    .logo-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .logo-sub {
      font-size: 0.85rem;
      color: #6b6b85;
      margin-top: 4px;
    }
    .card {
      background: #111118;
      border: 1px solid #2a2a38;
      border-radius: 20px;
      padding: 32px;
    }
    .card-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .card-sub {
      font-size: 0.83rem;
      color: #6b6b85;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b6b85;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      transition: border-color 0.18s;
    }
    input:focus {
      outline: none;
      border-color: #7c6aff;
      box-shadow: 0 0 0 3px rgba(124,106,255,0.12);
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c6aff, #a855f7);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.18s, transform 0.18s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">💎</div>
    <div class="logo-name">DizelFinance</div>
    <div class="logo-sub">Личный финансовый трекер</div>
  </div>
  <div class="card">
    <div class="card-title">Войти</div>
    <div class="card-sub">Введите учётные данные</div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="error">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" required>
      </div>
      <button class="btn" type="submit">Войти →</button>
    </form>
  </div>
</div>
</body>
</html>
